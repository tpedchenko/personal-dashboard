# Next.js Production — prod.taras.cloud
# Separate PostgreSQL + Next.js app, isolated from old Streamlit prod.
#
# Deploy: bash deploy/deploy-prod.sh
# Access: https://prod.taras.cloud (via Cloudflare Tunnel)
#         http://192.168.1.129:8003 (local)

services:
  pd-redis-prod:
    image: redis:7-alpine
    container_name: pd-redis-prod
    restart: unless-stopped
    env_file:
      - /opt/docker/secrets/.pd-prod.env
    command: >
      sh -c 'redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru --requirepass "$$REDIS_PASSWORD"'
    healthcheck:
      test: >
        sh -c 'redis-cli -a "$$REDIS_PASSWORD" ping'
      interval: 10s
      timeout: 3s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - backend-prod

  pd-db-prod:
    image: postgres:16-alpine
    container_name: pd-db-prod
    restart: unless-stopped
    volumes:
      - pd-pgdata-prod:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: dashboard_prod
      POSTGRES_USER: dash
      POSTGRES_PASSWORD: ${PG_PASSWORD:?PG_PASSWORD must be set}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dash -d dashboard_prod"]
      interval: 5s
      timeout: 3s
      retries: 5
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "max_connections=30"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - backend-prod

  pd-pgbouncer-prod:
    image: edoburu/pgbouncer:latest
    container_name: pd-pgbouncer-prod
    restart: unless-stopped
    depends_on:
      pd-db-prod:
        condition: service_healthy
    environment:
      DB_HOST: pd-db-prod
      DB_PORT: "5432"
      DB_NAME: dashboard_prod
      DB_USER: dash
      DB_PASSWORD: ${PG_PASSWORD:?PG_PASSWORD must be set}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 100
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      SERVER_RESET_QUERY: DISCARD ALL
      AUTH_TYPE: scram-sha-256
      LISTEN_PORT: "6432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - backend-prod

  pd-next-prod:
    image: pd-next-prod:latest
    container_name: pd-next-prod
    restart: unless-stopped
    ports:
      - "8003:3000"
    depends_on:
      pd-pgbouncer-prod:
        condition: service_healthy
      pd-redis-prod:
        condition: service_healthy
    volumes:
      - /opt/docker/freqtrade/user_data:/freqtrade-config:rw
    env_file:
      - /opt/docker/secrets/.pd-prod.env
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - frontend-prod
      - backend-prod

  pd-scheduler-prod:
    image: pd-scheduler-prod:latest
    container_name: pd-scheduler-prod
    restart: unless-stopped
    depends_on:
      pd-db-prod:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://dash:${PG_PASSWORD:?PG_PASSWORD must be set}@pd-db-prod:5432/dashboard_prod
      - DB_BACKEND=postgres
      - GARTH_SESSION_DIR=/home/data/garth_sessions
      - SKIP_SCHEDULED_JOBS=0
    volumes:
      - pd-data-prod:/home/data
    command: ["python", "deploy/scheduler.py"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend-prod
      - frontend-prod

  pd-bot-prod:
    image: pd-scheduler-prod:latest
    container_name: pd-bot-prod
    restart: unless-stopped
    depends_on:
      pd-db-prod:
        condition: service_healthy
    env_file:
      - /opt/docker/secrets/.pd-bot.env
    environment:
      - DB_BACKEND=postgres
    command: ["python", "-c", "from src.telegram_bot.core import run_bot; run_bot()"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend-prod
      - frontend-prod

networks:
  frontend-prod:
    name: pd-frontend-prod
  backend-prod:
    name: pd-backend-prod
    internal: true

volumes:
  pd-pgdata-prod:
  pd-data-prod:
